<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shelf Life Chart • Project 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --md-primary: #228B22;
            --md-surface: #f8f9f8;
            --md-on-surface: #212529;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Inter', system_ui, -apple-system, sans-serif;
            background: #f0f0f0;
            color: var(--md-on-surface);
            line-height: 1.5;
            padding: 0;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        
        .app-bar {
            background: var(--md-primary);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .app-bar h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .gear {
            font-size: 28px;
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .gear:active {
            background: rgba(255,255,255,0.2);
        }
        
        .main {
            padding: 24px 16px 40px;
            max-width: 480px;
            margin: 0 auto;
        }
        
        .section-header {
            font-size: 20px;
            font-weight: 600;
            color: var(--md-primary);
            margin: 32px 0 12px;
            padding-left: 4px;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .product-card {
            background: white;
            border-radius: 24px;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 118px;
        }
        
        .product-card.selected {
            background: #e8f4e8;
            border: 3px solid var(--md-primary);
        }
        
        .product-name {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 8px;
        }
        
        .shelf-life {
            margin-top: 8px;
            font-size: 13px;
            background: #e8f4e8;
            color: var(--md-primary);
            padding: 4px 18px;
            border-radius: 9999px;
            font-weight: 500;
        }
        
        .result {
            margin-top: 32px;
            background: white;
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }
        
        .expiry-card {
            background: white;
            border: 3px solid #222;
            border-radius: 24px;
            padding: 32px 24px;
            margin: 0 auto;
            width: 100%;
            max-width: 280px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        .expiry-product {
            font-size: 21px;
            font-weight: 600;
            margin-bottom: 14px;
        }
        
        .expiry-weekday {
            font-size: 27px;
            font-weight: 700;
            color: #e63939;
            margin-bottom: 8px;
        }
        
        .expiry-datetime {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px 8px !important;
            font-size: 15px;
        }
        .mobile-action-btn {
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 10px;
            margin: 0 3px;
        }
    </style>
</head>
<body>
    <div class="app-bar">
        <h1>Shelf Life Chart</h1>
        <div class="app-bar-actions">
            <span onclick="toggleSettings()" class="gear">⚙️</span>
        </div>
    </div>

    <div class="main">
        <div id="productSections"></div>

        <div class="result" id="resultPanel">
            <h3>Your Expiry Date</h3>
            <div class="expiry-card" id="previewLabel">
                <div class="expiry-product" id="previewProduct"></div>
                <div class="expiry-weekday" id="previewWeekday"></div>
                <div class="expiry-datetime" id="previewDate"></div>
            </div>
            <p style="margin-top:24px; font-size:14px; color:#666;">Calculated using today’s exact time</p>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:9999; align-items:flex-end;">
        <div style="background:white; width:100%; max-width:480px; margin:0 auto; border-top-left-radius:28px; border-top-right-radius:28px; max-height:92vh; overflow:auto;">
            <div style="padding:20px 24px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:white; z-index:10;">
                <h2 style="margin:0; font-size:22px;">Item Settings • Campaign 2</h2>
                <button onclick="toggleSettings()" style="background:#228B22; color:white; border:none; width:48px; height:48px; border-radius:50%; font-size:28px;">✕</button>
            </div>
            
            <div style="padding:24px;">
                <table style="width:100%; border-collapse:collapse; margin-bottom:30px;">
                    <thead>
                        <tr style="background:#f8f9fa;">
                            <th style="padding:12px; text-align:center; border-bottom:2px solid #ddd; width:40px;">#</th>
                            <th style="padding:12px; text-align:left; border-bottom:2px solid #ddd;">Name</th>
                            <th style="padding:12px; text-align:center; border-bottom:2px solid #ddd; width:70px;">Days</th>
                            <th style="padding:12px; text-align:center; border-bottom:2px solid #ddd; width:70px;">Hours</th>
                            <th style="padding:12px; text-align:center; border-bottom:2px solid #ddd;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="settingsItemsList"></tbody>
                </table>

                <h3 id="settingsFormTitle" style="margin-bottom:12px;">Add / Edit Item</h3>
                
                <div style="margin-bottom:16px;">
                    <label style="font-size:14px; display:block; margin-bottom:8px;">Unit</label>
                    <select id="newUnit" style="width:100%; padding:14px; border:2px solid #ddd; border-radius:16px; font-size:16px;">
                        <option value="days">Days</option>
                        <option value="hours">Hours</option>
                    </select>
                </div>

                <div style="margin-bottom:16px;">
                    <label style="font-size:14px; display:block; margin-bottom:8px;">Value</label>
                    <input id="newValue" type="number" placeholder="10" style="width:100%; padding:14px; border:2px solid #ddd; border-radius:16px;">
                </div>

                <input id="newName" placeholder="Product name" style="width:100%; padding:14px; border:2px solid #ddd; border-radius:16px; font-size:16px;">

                <button onclick="addOrUpdateItem()" style="margin-top:28px; background:#228B22; color:white; border:none; width:100%; padding:14px; border-radius:16px; font-size:16px;">Save Item</button>
            </div>
        </div>
    </div>

    <script>
        // === GROUPED SECTIONS (Wings now added under Chicken Sides) ===
        let sections = [
            { title: "Prepped Sauces", items: [
                {name:"Hot Honey", days:35},
                {name:"Burger Sauce", days:14},
                {name:"Cheese Sauce", days:8},
                {name:"Pizza Sauce", days:10},
                {name:"BBQ Sauce", days:10},
                {name:"Garlic Butter", days:10}
            ]},
            { title: "Veg", items: [
                {name:"Jalapenos", days:11},
                {name:"Pineapple", days:10},
                {name:"Sweetcorn", days:11},
                {name:"Gherkins", days:16}
            ]},
            { title: "Meats", items: [
                {name:"Tuna", days:6},
                {name:"Chicken Strips", days:9},
                {name:"Tandoori", days:10},
                {name:"Meatballs", days:9},
                {name:"Beef", days:9},
                {name:"Nduja", days:12},
                {name:"Chorizo", days:12},
                {name:"Pepperoni Frozen", days:12},
                {name:"Sausage", days:6}
            ]},
            { title: "Chicken Sides", items: [
                {name:"Strippers", days:10},
                {name:"Kickers", days:10},
                {name:"Boneless Bites", days:9},
                {name:"Tenders", days:9},
                {name:"Wings", days:9}
            ]},
            { title: "Sides", items: [
                {name:"Wedges", days:7},
                {name:"Fries", days:7},
                {name:"Mac N Cheese", hours:48}
            ]},
            { title: "Cheese", items: [
                {name:"Delight Cheese", days:9},
                {name:"PB Cheese", days:7},
                {name:"String Cheese", days:7}
            ]},
            { title: "Bases", items: [
                {name:"Thin Crust 7\"", days:21},
                {name:"Thin Crust 11.5\"", days:21},
                {name:"Thin Crust 13.5\"", days:21},
                {name:"Wrapz", days:22}
            ]},
            { title: "Deserts", items: [
                {name:"Cookies", days:17},
                {name:"Creme Egg Cookies", days:14}
            ]},
            { title: "Sauces Ambient", items: [
                {name:"Cheese Sauce Ambient", hours:15},
                {name:"Pizza Sauce Ambient", hours:15},
                {name:"BBQ Sauce Ambient", hours:15},
                {name:"Garlic Spread Ambient", hours:12}
            ]}
        ];

        let shelfLifeItems = sections.flatMap(section => section.items.map(item => ({...item})));
        let selectedProduct = null;
        let editingIndex = -1;

        if (localStorage.getItem("shelfLifeItems")) {
            shelfLifeItems = JSON.parse(localStorage.getItem("shelfLifeItems"));
        }

        function saveItems() {
            localStorage.setItem("shelfLifeItems", JSON.stringify(shelfLifeItems));
        }

        function syncSectionsFromFlat() {
            const itemMap = new Map(shelfLifeItems.map(item => [item.name, item]));
            sections.forEach(section => {
                section.items = section.items
                    .map(oldItem => itemMap.get(oldItem.name))
                    .filter(Boolean);
            });
            const existingNames = new Set(sections.flatMap(s => s.items.map(i => i.name)));
            const newItems = shelfLifeItems.filter(item => !existingNames.has(item.name));
            if (newItems.length > 0) {
                let custom = sections.find(s => s.title === "Custom Items");
                if (!custom) {
                    custom = { title: "Custom Items", items: [] };
                    sections.push(custom);
                }
                custom.items.push(...newItems);
            }
        }

        function renderDaysCard(item) {
            const div = document.createElement("div");
            div.className = "product-card" + (selectedProduct && selectedProduct.name === item.name ? " selected" : "");
            
            const nameEl = document.createElement("div");
            nameEl.className = "product-name";
            nameEl.textContent = item.name;
            
            const shelfEl = document.createElement("div");
            shelfEl.className = "shelf-life";
            shelfEl.textContent = item.days + " days";
            
            div.appendChild(nameEl);
            div.appendChild(shelfEl);
            
            div.onclick = () => { 
                selectedProduct = item; 
                renderProductList(); 
                calculateExpiry(); 
            };
            return div;
        }

        function renderHoursCard(item) {
            const div = document.createElement("div");
            div.className = "product-card" + (selectedProduct && selectedProduct.name === item.name ? " selected" : "");
            
            const nameEl = document.createElement("div");
            nameEl.className = "product-name";
            nameEl.textContent = item.name;
            
            const shelfEl = document.createElement("div");
            shelfEl.className = "shelf-life";
            shelfEl.textContent = item.hours + " hours";
            
            div.appendChild(nameEl);
            div.appendChild(shelfEl);
            
            div.onclick = () => { 
                selectedProduct = item; 
                renderProductList(); 
                calculateExpiry(); 
            };
            return div;
        }

        function renderProductList() {
            const container = document.getElementById("productSections");
            container.innerHTML = "";

            sections.forEach(section => {
                if (section.items.length === 0) return;

                const header = document.createElement("h2");
                header.className = "section-header";
                header.textContent = section.title;
                container.appendChild(header);

                const grid = document.createElement("div");
                grid.className = "product-grid";
                section.items.forEach(item => {
                    if (item.hours) {
                        grid.appendChild(renderHoursCard(item));
                    } else {
                        grid.appendChild(renderDaysCard(item));
                    }
                });
                container.appendChild(grid);
            });
        }

        function calculateExpiryForDays(product) {
            const now = new Date();
            let expiryDate = new Date(now);
            expiryDate.setDate(expiryDate.getDate() + (product.days || 0) - 1);
            return expiryDate;
        }

        function calculateExpiryForHours(product) {
            const now = new Date();
            return new Date(now.getTime() + product.hours * 60 * 60 * 1000);
        }

        function calculateExpiry() {
            if (!selectedProduct) return;
            const expiryDate = selectedProduct.hours ? calculateExpiryForHours(selectedProduct) : calculateExpiryForDays(selectedProduct);

            const formatUKDate = d => d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' });
            const getWeekday = d => d.toLocaleDateString('en-GB', { weekday: 'long' });
            const formatTime = d => d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

            document.getElementById("previewProduct").textContent = selectedProduct.name;
            document.getElementById("previewWeekday").innerHTML = `<span style="color:#e63939;">${getWeekday(expiryDate)}</span>`;

            if (selectedProduct.hours) {
                document.getElementById("previewDate").innerHTML = formatUKDate(expiryDate) + ' <span style="font-size:28px;">' + formatTime(expiryDate) + '</span>';
            } else {
                document.getElementById("previewDate").innerHTML = formatUKDate(expiryDate);
            }

            document.getElementById("resultPanel").classList.add("show");
            setTimeout(() => document.getElementById("resultPanel").scrollIntoView({ behavior: "smooth" }), 100);
        }

        function toggleSettings() {
            const panel = document.getElementById("settingsPanel");
            panel.style.display = panel.style.display === "flex" ? "none" : "flex";
            if (panel.style.display === "flex") renderSettingsList();
        }

        function moveItem(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= shelfLifeItems.length) return;
            [shelfLifeItems[index], shelfLifeItems[newIndex]] = [shelfLifeItems[newIndex], shelfLifeItems[index]];
            saveItems();
            syncSectionsFromFlat();
            renderSettingsList();
            renderProductList();
        }

        function renderSettingsList() {
            const tbody = document.getElementById("settingsItemsList");
            tbody.innerHTML = "";
            shelfLifeItems.forEach((item, i) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="padding:16px 8px; border-bottom:1px solid #eee; text-align:center; font-weight:600; color:#555;">${i+1}</td>
                    <td style="padding:16px 8px; border-bottom:1px solid #eee;">${item.name}</td>
                    <td style="padding:16px 8px; border-bottom:1px solid #eee; text-align:center;">${item.days || ''}</td>
                    <td style="padding:16px 8px; border-bottom:1px solid #eee; text-align:center;">${item.hours || ''}</td>
                    <td style="padding:16px 8px; border-bottom:1px solid #eee; text-align:center;">
                        <button onclick="moveItem(${i}, -1)" class="mobile-action-btn" style="background:#555;color:white;">↑</button>
                        <button onclick="moveItem(${i}, 1)" class="mobile-action-btn" style="background:#555;color:white;">↓</button>
                        <button onclick="editItem(${i});" class="mobile-action-btn" style="background:#08f;color:white;">Edit</button>
                        <button onclick="deleteItem(${i});" class="mobile-action-btn" style="background:#c00;color:white;">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function editItem(index) {
            editingIndex = index;
            const item = shelfLifeItems[index];
            document.getElementById("settingsFormTitle").textContent = "Edit Item";
            document.getElementById("newName").value = item.name;
            document.getElementById("newValue").value = item.hours || item.days || "";
            document.getElementById("newUnit").value = item.hours ? "hours" : "days";
        }

        function deleteItem(index) {
            if (confirm("Delete this item permanently?")) {
                shelfLifeItems.splice(index, 1);
                saveItems();
                syncSectionsFromFla
